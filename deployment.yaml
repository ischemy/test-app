apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-app
        image: test-app:local
        imagePullPolicy: Never # Wajib 'Never' karena kita load manual ke node
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: db-secret # Nama secret yang dibuat di CICD
---
apiVersion: v1
kind: Service
metadata:
  name: test-app-service
spec:
  selector:
    app: test-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
