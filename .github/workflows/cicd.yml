name: CI/CD Test App Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Sesuaikan dengan versi di go.mod kamu

      - name: Prepare Dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build Docker Image
        run: |
          docker build -t test-app:latest .
          docker save test-app:latest -o test-app.tar

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Pastikan secret ini berisi PRIVATE KEY lengkap (Begin & End)
          ssh-private-key: ${{ secrets.SSH_KEY }}
          ssh-passphrase: ${{ secrets.SSH_PASSPHRASE }}

      - name: Deploy to Servers
        run: |
          # Opsi SSH agar tidak minta konfirmasi fingerprint (YES/NO)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          
          echo "🚀 Uploading to Master (10.192.15.2)..."
          scp $SSH_OPTS test-app.tar devops@10.192.15.2:~/test-app.tar
          ssh $SSH_OPTS devops@10.192.15.2 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "🚀 Uploading to Worker (10.192.15.5) via Master..."
          # ProxyJump (-J) menggunakan user devops di master untuk lompat ke adminlintas di worker
          scp $SSH_OPTS -J devops@10.192.15.2 test-app.tar adminlintas@10.192.15.5:~/test-app.tar
          ssh $SSH_OPTS -J devops@10.192.15.2 adminlintas@10.192.15.5 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "✅ Deployment Selesai!"
