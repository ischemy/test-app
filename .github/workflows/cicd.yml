name: CI/CD K8s & Docker Compose Deploy via Bridge

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build Image
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Save Image
        run: |
          go mod tidy
          # Build image sekali saja di runner
          docker build -t test-app:local .
          docker save test-app:local -o test-app.tar

      - name: Connect to WireGuard
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5

      - name: Setup Multi-SSH Agent with Passphrase
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_MASTER }}" > ~/.ssh/id_master
          echo "${{ secrets.SSH_PRIVATE_KEY_WORKER }}" > ~/.ssh/id_worker
          chmod 600 ~/.ssh/id_master ~/.ssh/id_worker
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ForwardAgent yes
            AddKeysToAgent yes
          EOF
          eval $(ssh-agent -s)
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh/askpass.sh
          setsid ssh-add ~/.ssh/id_master < /dev/null
          setsid ssh-add ~/.ssh/id_worker < /dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: Deploy via Master Bridge
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
        run: |
          echo "🚀 Sending artifacts to Master..."
          scp test-app.tar deployment.yaml docker-compose.yml devops@10.192.15.2:~/
          
          ssh -A devops@10.192.15.2 << 'EOF'
            set -e
            
            # --- MASTER SIDE: LOAD IMAGE UNTUK MASTER NODE ---
            echo "📦 Loading image on Master..."
            docker load -i ~/test-app.tar
            sudo ctr -n k8s.io images import ~/test-app.tar || true

            # --- WORKER SIDE: LOAD IMAGE UNTUK WORKER NODE ---
            echo "📦 Forwarding to Worker (10.192.15.5)..."
            scp -o StrictHostKeyChecking=no ~/test-app.tar ~/docker-compose.yml adminlintas@10.192.15.5:~/
            
            ssh -o StrictHostKeyChecking=no adminlintas@10.192.15.5 << 'WORKER_EOF'
              set -e
              echo "🐳 Loading image to Docker (for Compose)..."
              docker load -i ~/test-app.tar
              
              echo "☸️ Loading image to Containerd (for K8s/Kubeadm)..."
              # Kubeadm butuh image di namespace k8s.io
              sudo ctr -n k8s.io images import ~/test-app.tar
              
              echo "📝 Creating .env..."
              cat <<ENV > .env
              DB_HOST=${{ secrets.DB_HOST }}
              DB_USER=${{ secrets.DB_USER }}
              DB_NAME=${{ secrets.DB_NAME }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENV
              
              docker compose up -d || docker-compose up -d
              rm ~/test-app.tar
          WORKER_EOF

            # --- K8s DEPLOYMENT ---
            echo "🏗️ Updating K8s Secrets & Deployment..."
            printf "DB_HOST=${{ secrets.DB_HOST }}\nDB_USER=${{ secrets.DB_USER }}\nDB_PASSWORD=${{ secrets.DB_PASSWORD }}\nDB_NAME=${{ secrets.DB_NAME }}" > .db.env
            kubectl create secret generic db-secret --from-env-file=.db.env --dry-run=client -o yaml | kubectl apply -f -
            rm .db.env

            kubectl apply -f ~/deployment.yaml
            kubectl rollout restart deployment/test-app-deployment
            
            rm ~/test-app.tar ~/deployment.yaml ~/docker-compose.yml
            echo "✅ DEPLOYMENT FINISHED!"
          EOF
