name: CI/CD Deploy App Final - WireGuard Safe Mode

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Prepare Go Modules
        run: |
          go mod tidy
          go mod download

      - name: Build Docker Image
        run: |
          docker build -t test-app:latest .
          docker save test-app:latest -o test-app.tar

      - name: Connect to WireGuard (Base64 Safe Mode)
        shell: bash
        env:
          # Kita ambil mentah-mentah dari secret
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          
          # TRICK: Kita hapus semua karakter yang BUKAN karakter Base64 (A-Z, a-z, 0-9, +, /, =)
          # Ini akan membuang tanda petik (') secara paksa jika ada yang nyelip
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          CLEAN_PUB=$(echo -n "$WG_PUB" | tr -dc 'A-Za-z0-9+/=')
          CLEAN_END=$(echo -n "$WG_END" | tr -d '\n' | tr -d ' ' | tr -d "'")

          # Simpan ke file tanpa echo (pakai printf agar lebih steril)
          printf "%s" "$CLEAN_PRIV" > private.key
          chmod 600 private.key
          
          # Tambahkan interface
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          
          # Set konfigurasi menggunakan file private.key
          sudo wg set wg0 private-key ./private.key \
            peer "$CLEAN_PUB" \
            endpoint "$CLEAN_END" \
            allowed-ips 10.192.15.0/24 \
            persistent-keepalive 25
          
          sudo ip link set up dev wg0
          sleep 10
          
          echo "📊 Status VPN:"
          sudo wg show
          
          echo "🔍 Ping Master (10.192.15.2)..."
          ping -c 3 10.192.15.2 || (echo "❌ VPN Gagal Terhubung ke Master!" && exit 1)

      - name: Setup SSH Key with Passphrase
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo 'echo "${{ secrets.SSH_PASSPHRASE }}"' > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddKeysToAgent yes
          EOF

          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Transfer and Load Image to Master & Worker
        run: |
          # Deploy ke Master
          echo "🚀 Mengirim image ke Master (10.192.15.2)..."
          scp test-app.tar devops@10.192.15.2:~/test-app.tar
          ssh devops@10.192.15.2 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          # Deploy ke Worker via Master (ProxyJump)
          echo "🚀 Mengirim image ke Worker (10.192.15.5) via Master..."
          scp -J devops@10.192.15.2 test-app.tar adminlintas@10.192.15.5:~/test-app.tar
          ssh -J devops@10.192.15.2 adminlintas@10.192.15.5 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "✅ DEPLOYMENT BERHASIL!"
