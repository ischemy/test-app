name: CI/CD K8s & Docker Compose Deploy via Bridge

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build Image
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Save Image
        run: |
          go mod tidy
          docker build -t test-app:local .
          docker save test-app:local -o test-app.tar

      - name: Connect to WireGuard
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5
          ping -c 3 10.192.15.2

      - name: Setup SSH for GitHub to Master
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: Deploy via Master Bridge (K8s & Docker Compose)
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
        run: |
          # 1. Kirim semua file yang dibutuhkan ke Master (Jump Host)
          echo "🚀 Sending files to Master..."
          scp test-app.tar deployment.yaml docker-compose.yml devops@10.192.15.2:~/
          
          # 2. Eksekusi Remote di Master Node
          ssh devops@10.192.15.2 << 'EOF'
            set -e
            
            # --- BAGIAN A: WORKER NODE (DOCKER COMPOSE) ---
            echo "📦 Forwarding image & compose to Worker (10.192.15.5)..."
            scp -o StrictHostKeyChecking=no ~/test-app.tar ~/docker-compose.yml adminlintas@10.192.15.5:~/
            
            ssh -o StrictHostKeyChecking=no adminlintas@10.192.15.5 << 'WORKER_EOF'
              set -e
              echo "🐳 Loading image on Worker..."
              docker load -i ~/test-app.tar
              
              echo "📝 Creating .env for Docker Compose..."
              cat <<ENV > .env
              DB_HOST=${{ secrets.DB_HOST }}
              DB_USER=${{ secrets.DB_USER }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              DB_NAME=${{ secrets.DB_NAME }}
          ENV
              
              echo "🚀 Starting Docker Compose..."
              # Menggunakan docker compose (v2) atau docker-compose (v1)
              docker compose up -d || docker-compose up -d
              
              rm ~/test-app.tar
          WORKER_EOF

            # --- BAGIAN B: MASTER NODE (KUBERNETES) ---
            echo "🏗️ Updating K8s Secrets..."
            cat <<SEC > .db.env
            DB_HOST=${{ secrets.DB_HOST }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
          SEC
            
            kubectl create secret generic db-secret \
              --from-env-file=.db.env \
              --dry-run=client -o yaml | kubectl apply -f -
            rm .db.env

            echo "☸️ Applying K8s Manifests..."
            kubectl apply -f ~/deployment.yaml
            kubectl rollout restart deployment/test-app-deployment
            
            # Cleanup di Master
            rm ~/test-app.tar ~/deployment.yaml ~/docker-compose.yml
            echo "✅ ALL DEPLOYMENTS FINISHED!"
          EOF
