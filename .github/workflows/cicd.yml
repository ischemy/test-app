name: CI/CD K8s Deploy - No Base64 Mode

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Docker Image
        run: |
          docker build -t test-app:latest .
          # Kita simpan tar jika kamu masih ingin load manual ke Node K8s
          docker save test-app:latest -o test-app.tar

      - name: Connect to WireGuard (Clean Mode)
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          chmod 600 private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5
          ping -c 3 10.192.15.2

      - name: Setup SSH Key (Fixed Format No-Base64)
        run: |
          mkdir -p ~/.ssh
          # Menggunakan 'EOF' dengan kutip agar variable tidak di-expand/rusak
          cat <<'EOF' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          
          chmod 600 ~/.ssh/id_rsa
          
          # Setup bypass passphrase
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddKeysToAgent yes
          EOF

          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: Deploy to Kubernetes via Master
        run: |
          # 1. Kirim image ke Master (jika node K8s ada di sana)
          echo "🚀 Transferring image to Master..."
          scp test-app.tar devops@10.192.15.2:~/test-app.tar
          ssh devops@10.192.15.2 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          # 2. Update Kubernetes (Rollout)
          # Asumsi manifest sudah ada di server atau menggunakan kubectl apply
          echo "🚀 Restarting K8s Deployment..."
          ssh devops@10.192.15.2 "kubectl rollout restart deployment/test-app"
          
          echo "✅ Deployment K8s Selesai!"
