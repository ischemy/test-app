name: CI/CD Deploy App Final - Anti Libcrypto Mode

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Prepare Go Modules
        run: |
          go mod tidy
          go mod download

      - name: Build Docker Image
        run: |
          docker build -t test-app:latest .
          docker save test-app:latest -o test-app.tar

      - name: Connect to WireGuard (Absolute Clean Mode)
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          
          # Hapus SEMUA karakter sampah yang bukan Base64 (A-Z, a-z, 0-9, +, /, =)
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          CLEAN_PUB=$(echo -n "$WG_PUB" | tr -dc 'A-Za-z0-9+/=')
          CLEAN_END=$(echo -n "$WG_END" | tr -d '\n' | tr -d ' ' | tr -d "'")

          # Gunakan printf agar tidak ada newline otomatis di akhir file key
          printf "%s" "$CLEAN_PRIV" > private.key
          chmod 600 private.key
          
          # Validasi Panjang: Harus 44 karakter
          LEN=$(wc -c < private.key)
          if [ "$LEN" -ne 44 ]; then
            echo "❌ ERROR: Panjang key WG $LEN karakter (Harus 44). Cek isi Secret!"
            exit 1
          fi

          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          
          sudo wg set wg0 private-key ./private.key \
            peer "$CLEAN_PUB" \
            endpoint "$CLEAN_END" \
            allowed-ips 10.192.15.0/24 \
            persistent-keepalive 25
          
          sudo ip link set up dev wg0
          sleep 10
          sudo wg show
          ping -c 3 10.192.15.2 || (echo "❌ VPN Gagal!" && exit 1)

      - name: Setup SSH Key (Fixed Format)
        run: |
          mkdir -p ~/.ssh
          
          # Pakai 'EOF' (dengan kutip) dan pastikan menempel ke kiri (no indent)
          cat <<'EOF' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          
          # Hapus spasi liar atau karakter carriage return (\r) yang mungkin masuk saat copy
          sed -i 's/^[[:space:]]*//' ~/.ssh/id_rsa
          tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa_clean
          mv ~/.ssh/id_rsa_clean ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Script bypass passphrase otomatis
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddKeysToAgent yes
          EOF

          eval $(ssh-agent -s)
          # Inject key menggunakan passphrase otomatis
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Transfer and Load Image to Master & Worker
        run: |
          # Deploy ke Master (10.192.15.2)
          echo "🚀 Mengirim image ke Master..."
          scp test-app.tar devops@10.192.15.2:~/test-app.tar
          ssh devops@10.192.15.2 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          # Deploy ke Worker (10.192.15.5) via Master
          echo "🚀 Mengirim image ke Worker via Master..."
          scp -J devops@10.192.15.2 test-app.tar adminlintas@10.192.15.5:~/test-app.tar
          ssh -J devops@10.192.15.2 adminlintas@10.192.15.5 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "✅ DEPLOYMENT BERHASIL!"
