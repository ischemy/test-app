name: CI/CD test-app Biznet VPN

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETUP VPN WIREGUARD
      - name: Install & Connect WireGuard
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          echo "${{ secrets.WG_CONFIG }}" > wg0.conf
          sudo wg-quick up ./wg0.conf
          # Tunggu handshake VPN stabil
          sleep 5
          # Verifikasi jalur ke Master & DB
          ping -c 2 10.192.15.4
          ping -c 2 10.192.15.6

      # 2. SETUP SSH ACCESS
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Scan host via jalur VPN agar tidak ditanya fingerprint (Yes/No)
          ssh-keyscan -H 10.192.15.4 10.192.15.5 >> ~/.ssh/known_hosts

      # 3. BUILD & EXPORT IMAGE (64-bit Alpine)
      - name: Build and Export Docker Image
        run: |
          docker build -t test-app:local .
          docker save test-app:local -o test-app.tar

      # 4. TRANSFER & DEPLOY (Kirim via SCP VPN)
      - name: Remote Deploy to Biznet Nodes
        run: |
          # Node list sesuai environment Anda
          NODES="10.192.15.4 10.192.15.5"
          
          for ip in $NODES; do
            echo "------------------------------------------"
            echo "Deploying to adminlintas@$ip..."
            
            # Buat direktori jika belum ada
            ssh adminlintas@$ip "mkdir -p ~/test-app"
            
            # Kirim file .tar dan docker-compose.yml
            scp test-app.tar docker-compose.yml adminlintas@$ip:~/test-app/
            
            # Load image dan jalankan (Injeksi Secrets langsung)
            ssh adminlintas@$ip "
                cd ~/test-app && \
                docker load -i test-app.tar && \
                DB_HOST='${{ secrets.DB_HOST }}' \
                DB_USER='${{ secrets.DB_USER }}' \
                DB_NAME='${{ secrets.DB_NAME }}' \
                DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
                docker-compose up -d && \
                rm test-app.tar
            "
          done

      # 5. DISCONNECT VPN (Cleanup)
      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down ./wg0.conf
