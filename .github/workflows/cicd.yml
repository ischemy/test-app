name: CI/CD K8s & Docker Compose Deploy via Bridge

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build Image
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Save Image
        run: |
          go mod tidy
          docker build -t test-app:local .
          docker save test-app:local -o test-app.tar

      - name: Connect to WireGuard
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5
          ping -c 3 10.192.15.2

      - name: Setup Multi-SSH Agent with Passphrase
        run: |
          mkdir -p ~/.ssh
          # Simpan kedua private key ke file berbeda
          echo "${{ secrets.SSH_PRIVATE_KEY_MASTER }}" > ~/.ssh/id_master
          echo "${{ secrets.SSH_PRIVATE_KEY_WORKER }}" > ~/.ssh/id_worker
          chmod 600 ~/.ssh/id_master ~/.ssh/id_worker
          
          # Script askpass untuk menyuntikkan passphrase secara otomatis
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ForwardAgent yes
            AddKeysToAgent yes
          EOF

          # Jalankan SSH Agent
          eval $(ssh-agent -s)
          
          # Gunakan SSH_ASKPASS untuk mendaftarkan kedua kunci tanpa interaksi manual
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh/askpass.sh
          setsid ssh-add ~/.ssh/id_master < /dev/null
          setsid ssh-add ~/.ssh/id_worker < /dev/null
          
          # Simpan SSH_AUTH_SOCK agar step berikutnya bisa akses Agent
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: Deploy via Master Bridge (Double Key Relay)
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
        run: |
          echo "🚀 Sending artifacts to Master Node..."
          scp test-app.tar deployment.yaml docker-compose.yml devops@10.192.15.2:~/
          
          # SSH ke Master dengan Agent Forwarding (-A)
          ssh -A devops@10.192.15.2 << 'EOF'
            set -e
            
            # --- BAGIAN WORKER (DOCKER COMPOSE) ---
            echo "📦 Forwarding to Worker (10.192.15.5)..."
            scp -o StrictHostKeyChecking=no ~/test-app.tar ~/docker-compose.yml adminlintas@10.192.15.5:~/
            
            ssh -o StrictHostKeyChecking=no adminlintas@10.192.15.5 << 'WORKER_EOF'
              set -e
              echo "🐳 Loading image on Worker..."
              docker load -i ~/test-app.tar
              
              echo "📝 Creating .env for Docker Compose..."
              cat <<ENV > .env
              DB_HOST=${{ secrets.DB_HOST }}
              DB_USER=${{ secrets.DB_USER }}
              DB_NAME=${{ secrets.DB_NAME }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENV
              
              echo "🚀 Starting Docker Compose..."
              # Deteksi versi docker compose yang terinstal di Worker
              if docker compose version > /dev/null 2>&1; then
                echo "Using Docker Compose V2 (docker compose)"
                docker compose up -d
              elif docker-compose version > /dev/null 2>&1; then
                echo "Using Docker Compose V1 (docker-compose)"
                docker-compose up -d
              else
                echo "❌ ERROR: Docker Compose tidak ditemukan di PATH!"
                # Alternatif: Coba cari di path umum jika command standar gagal
                /usr/local/bin/docker-compose up -d || { echo "Fatal Error"; exit 1; }
              fi
              
              rm ~/test-app.tar
          WORKER_EOF

            # --- BAGIAN MASTER (KUBERNETES) ---
            echo "🏗️ Updating K8s Secrets & Deployment..."
            cat <<SEC > .db.env
            DB_HOST=${{ secrets.DB_HOST }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
          SEC
            
            kubectl create secret generic db-secret --from-env-file=.db.env --dry-run=client -o yaml | kubectl apply -f -
            rm .db.env

            kubectl apply -f ~/deployment.yaml
            kubectl rollout restart deployment/test-app-deployment
            
            # Cleanup di Master
            rm ~/test-app.tar ~/deployment.yaml ~/docker-compose.yml
            echo "✅ DEPLOYMENT FINISHED!"
          EOF
