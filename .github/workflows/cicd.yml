name: CI/CD K8s Deploy via Jumphost

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build Image
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Save Image
        run: |
          go mod tidy
          docker build -t test-app:local .
          docker save test-app:local -o test-app.tar

      - name: Connect to WireGuard
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5

      - name: Setup SSH Config for Jumphost
        run: |
          mkdir -p ~/.ssh
          # Tulis Private Key (Tanpa Base64, pakai cat <<'EOF')
          cat <<'EOF' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          
          # Konfigurasi SSH: Masuk ke 10.192.15.5 WAJIB lewat devops@10.192.15.2
          cat <<EOF > ~/.ssh/config
          Host jumphost
            HostName 10.192.15.2
            User devops
            StrictHostKeyChecking no

          Host worker
            HostName 10.192.15.5
            User adminlintas
            ProxyJump jumphost
            StrictHostKeyChecking no
          EOF

          # Jalankan SSH Agent untuk handle Passphrase (jika ada)
          eval $(ssh-agent -s)
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Deploy to K8s Nodes
        run: |
          # 1. Load ke Jumphost/Master (10.192.15.2)
          echo "🚀 Sending image to Jumphost..."
          scp test-app.tar deployment.yaml jumphost:~/
          ssh jumphost "docker load -i ~/test-app.tar && rm ~/test-app.tar"

          # 2. Load ke Worker (10.192.15.5) otomatis lewat Jumphost
          echo "🚀 Sending image to Worker via Jumphost..."
          scp test-app.tar worker:~/
          ssh worker "docker load -i ~/test-app.tar && rm ~/test-app.tar"

          # 3. Eksekusi K8s Command di Master
          echo "🚀 Updating K8s Secrets and Deployment..."
          ssh jumphost "kubectl create secret generic db-secret \
            --from-literal=DB_HOST='${{ secrets.DB_HOST }}' \
            --from-literal=DB_USER='${{ secrets.DB_USER }}' \
            --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            --from-literal=DB_NAME='${{ secrets.DB_NAME }}' \
            --dry-run=client -o yaml | kubectl apply -f - && \
            kubectl apply -f ~/deployment.yaml && \
            kubectl rollout restart deployment/test-app-deployment"

          echo "✅ DEPLOYMENT FINISHED!"
