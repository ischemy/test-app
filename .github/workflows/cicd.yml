name: CI/CD Deploy to Kubernetes via WireGuard

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy-k8s:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build Docker Image
        run: |
          # Kita tetap build untuk memastikan kode aman
          docker build -t test-app:latest .
          # Jika pakai Registry, step 'docker push' ada di sini

      - name: Connect to WireGuard
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5
          ping -c 3 10.192.15.2

      - name: Setup SSH (Base64 Mode)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            AddKeysToAgent yes
          EOF
          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: K8s Deployment via SSH
        run: |
          # Kita perintahkan Master (Control Plane) untuk rollout restart atau apply manifest
          echo "🚀 Triggering K8s Deployment on Master..."
          
          # Opsi A: Jika manifest sudah ada di server Master
          ssh devops@10.192.15.2 "kubectl rollout restart deployment/test-app-deployment"
          
          # Opsi B: Jika ingin kirim manifest baru dari GitHub
          # scp deployment.yaml devops@10.192.15.2:~/deployment.yaml
          # ssh devops@10.192.15.2 "kubectl apply -f ~/deployment.yaml"

          echo "✅ Kubernetes updated!"
