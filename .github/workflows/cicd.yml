name: CI/CD Deploy App via WireGuard

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Prepare Go Modules
        run: |
          go mod tidy
          go mod download

      - name: Build Docker Image
        run: |
          docker build -t test-app:latest .
          docker save test-app:latest -o test-app.tar

      - name: Connect to WireGuard
        uses: egor-tensin/setup-wireguard@v1
        with:
          # IP & Port Publik Server WireGuard kamu (misal: 202.x.x.x:51820)
          endpoint: '${{ secrets.WG_ENDPOINT }}'
          endpoint_public_key: '${{ secrets.WG_SERVER_PUBLIC_KEY }}'
          # IP yang diberikan untuk Runner ini di dalam VPN (misal: 10.192.15.100/24)
          ips: '${{ secrets.WG_RUNNER_IP }}'
          # Range IP yang ingin diakses melalui tunnel ini
          allowed_ips: '10.192.15.0/24'
          # Private Key milik "Peer" GitHub Runner (bukan punya server)
          private_key: '${{ secrets.WG_PRIVATE_KEY }}'

      - name: Setup SSH Key with Passphrase
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo 'echo "${{ secrets.SSH_PASSPHRASE }}"' > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddKeysToAgent yes
          EOF

          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Transfer and Load Image
        run: |
          # Tes koneksi dulu ke Master
          ping -c 3 10.192.15.2
          
          echo "🚀 Sending to Master (10.192.15.2)..."
          scp test-app.tar devops@10.192.15.2:~/test-app.tar
          ssh devops@10.192.15.2 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "🚀 Sending to Worker (10.192.15.5) via Master..."
          scp -J devops@10.192.15.2 test-app.tar adminlintas@10.192.15.5:~/test-app.tar
          ssh -J devops@10.192.15.2 adminlintas@10.192.15.5 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "✅ Semua beres!"
