name: CI/CD Deploy App via WireGuard

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Prepare Go Modules
        run: |
          go mod tidy
          go mod download

      - name: Build Docker Image
        run: |
          docker build -t test-app:latest .
          docker save test-app:latest -o test-app.tar

      - name: Connect to WireGuard (Manual Clean Version)
        env:
          # Memasukkan secret ke env agar shell tidak merusak formatnya
          RAW_WG_PRIVATE_KEY: ${{ secrets.WG_PRIVATE_KEY }}
          RAW_WG_SERVER_PUBKEY: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          RAW_WG_ENDPOINT: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          
          # Hapus semua karakter yang BUKAN karakter Base64 (A-Z, a-z, 0-9, +, /, =)
          # Ini akan membersihkan tanda petik, spasi, atau newline yang nyelip
          CLEAN_PRIVATE=$(echo -n "$RAW_WG_PRIVATE_KEY" | tr -dc 'A-Za-z0-9+/=')
          CLEAN_PUBKEY=$(echo -n "$RAW_WG_SERVER_PUBKEY" | tr -dc 'A-Za-z0-9+/=')
          CLEAN_ENDPOINT=$(echo -n "$RAW_WG_ENDPOINT" | tr -d '\n' | tr -d ' ' | tr -d "'")
          
          echo -n "$CLEAN_PRIVATE" > private.key
          chmod 600 private.key
          
          # Inisialisasi interface wg0
          sudo ip link add dev wg0 type wireguard
          
          # Set IP Runner yang sudah kamu tentukan
          sudo ip addr add 10.192.15.20/24 dev wg0
          
          # Konfigurasi Peer menggunakan key yang sudah dibersihkan
          sudo wg set wg0 private-key ./private.key \
            peer "$CLEAN_PUBKEY" \
            endpoint "$CLEAN_ENDPOINT" \
            allowed-ips 10.192.15.0/24 \
            persistent-keepalive 25
          
          # Aktifkan interface
          sudo ip link set up dev wg0
          
          # Tunggu handshake & verifikasi
          sleep 10
          echo "📊 WireGuard Status:"
          sudo wg show
          
          echo "🔍 Testing Connection to Master (10.192.15.2)..."
          ping -c 3 10.192.15.2 || (echo "❌ VPN Aktif tapi Master 10.192.15.2 Tidak Respon!" && exit 1)

      - name: Setup SSH Key with Passphrase
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo 'echo "${{ secrets.SSH_PASSPHRASE }}"' > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddKeysToAgent yes
          EOF

          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Transfer and Load Image
        run: |
          echo "🚀 Sending to Master (10.192.15.2)..."
          scp test-app.tar devops@10.192.15.2:~/test-app.tar
          ssh devops@10.192.15.2 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "🚀 Sending to Worker (10.192.15.5) via Master..."
          scp -J devops@10.192.15.2 test-app.tar adminlintas@10.192.15.5:~/test-app.tar
          ssh -J devops@10.192.15.2 adminlintas@10.192.15.5 "docker load -i ~/test-app.tar && rm ~/test-app.tar"
          
          echo "✅ Deployment Sukses!"
