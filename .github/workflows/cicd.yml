name: CI/CD K8s Deploy Estafet Mode

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go & Build Image
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Save Image
        run: |
          go mod tidy
          docker build -t test-app:local .
          docker save test-app:local -o test-app.tar

      - name: Connect to WireGuard
        shell: bash
        env:
          WG_PRIV: ${{ secrets.WG_PRIVATE_KEY }}
          WG_PUB: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          WG_END: ${{ secrets.WG_ENDPOINT }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          CLEAN_PRIV=$(echo -n "$WG_PRIV" | tr -dc 'A-Za-z0-9+/=')
          printf "%s" "$CLEAN_PRIV" > private.key
          sudo ip link add dev wg0 type wireguard
          sudo ip addr add 10.192.15.20/24 dev wg0
          sudo wg set wg0 private-key ./private.key peer "$WG_PUB" endpoint "$WG_END" allowed-ips 10.192.15.0/24
          sudo ip link set up dev wg0
          sleep 5
          ping -c 3 10.192.15.2

      - name: Setup SSH (Fixed Format)
        run: |
          mkdir -p ~/.ssh
          cat <<'EOF' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          
          echo "echo '${{ secrets.SSH_PASSPHRASE }}'" > ~/.ssh/passphrase.sh
          chmod +x ~/.ssh/passphrase.sh
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddKeysToAgent yes
          EOF

          eval $(ssh-agent -s)
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/passphrase.sh setsid ssh-add ~/.ssh/id_rsa < /dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: Deploy via Master Estafet
        run: |
          # 1. Kirim Image, Manifest, dan Kunci SSH ke Master
          echo "🚀 Sending files and temporary key to Master..."
          scp test-app.tar deployment.yaml ~/.ssh/id_rsa devops@10.192.15.2:~/
          
          # 2. Eksekusi Berantai di dalam Master
          ssh devops@10.192.15.2 "
            set -e
            # Load image di Master
            echo '📦 Loading image on Master...'
            docker load -i ~/test-app.tar
            
            # Setup kunci SSH sementara di Master agar bisa tembus ke Worker
            chmod 600 ~/id_rsa
            
            # Kirim Image dari Master ke Worker
            echo '🚀 Sending image from Master to Worker (10.192.15.5)...'
            scp -i ~/id_rsa -o StrictHostKeyChecking=no ~/test-app.tar adminlintas@10.192.15.5:~/
            
            # Load Image di Worker
            echo '📦 Loading image on Worker...'
            ssh -i ~/id_rsa -o StrictHostKeyChecking=no adminlintas@10.192.15.5 'docker load -i ~/test-app.tar && rm ~/test-app.tar'
            
            # 3. K8s Deploy (Create Secret & Apply Manifest)
            echo '🏗️ Updating Kubernetes Resources...'
            kubectl create secret generic db-secret \
              --from-literal=DB_HOST='${{ secrets.DB_HOST }}' \
              --from-literal=DB_USER='${{ secrets.DB_USER }}' \
              --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              --from-literal=DB_NAME='${{ secrets.DB_NAME }}' \
              --dry-run=client -o yaml | kubectl apply -f -
            
            kubectl apply -f ~/deployment.yaml
            kubectl rollout restart deployment/test-app-deployment
            
            # Bersihkan file sampah di Master setelah selesai
            rm ~/id_rsa ~/test-app.tar ~/deployment.yaml
            echo '✅ Deployment Process Finished Successfully!'
          "
